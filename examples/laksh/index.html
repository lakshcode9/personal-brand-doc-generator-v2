            :root {
                --bg: #0a0a0b;
                --surface: #141416;
                --accent: #ceff00; /* Volt Green */
                --text-main: #ffffff;
                --text-dim: #88888e;
                --border: #2a2a2e;
                --grid-size: 40px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: var(--bg);
                color: var(--text-main);
                font-family: "Outfit", sans-serif;
                overflow-x: hidden;
                line-height: 1.6;
            }

            /* Atmospheric Background */
            body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image:
                    linear-gradient(
                        to right,
                        var(--border) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                    to bottom,
                    var(--border) 1px,
                    transparent 1px
                );
                background-size: var(--grid-size) var(--grid-size);
                mask-image: radial-gradient(
                    circle at 50% 50%,
                    black,
                    transparent 80%
                );
                z-index: -1;
                opacity: 0.3;
            }

            body::after {
                content: "";
                position: fixed;
                top: 50%;
                left: 50%;
                width: 100vw;
                height: 100vh;
                background: radial-gradient(
                    circle at center,
                    rgba(206, 255, 0, 0.05) 0%,
                    transparent 70%
                );
                transform: translate(-50%, -50%);
                z-index: -1;
                pointer-events: none;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 100px 20px;
            }

            /* Typography & Header */
            header {
                margin-bottom: 80px;
                text-align: center;
                opacity: 0;
                transform: translateY(30px);
                animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1)
                    forwards;
            }

            .brand-logo {
                font-family: "Syne", sans-serif;
                font-size: clamp(3rem, 10vw, 6rem);
                font-weight: 800;
                text-transform: uppercase;
                line-height: 0.9;
                letter-spacing: -0.05em;
                color: var(--text-main);
                margin-bottom: 20px;
            }

            .brand-logo span {
                color: var(--accent);
                display: block;
            }

            .subtitle {
                font-size: 1.2rem;
                color: var(--text-dim);
                letter-spacing: 0.2em;
                text-transform: uppercase;
            }

            /* Navigation */
            nav {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-bottom: 60px;
                opacity: 0;
                animation: reveal 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1)
                    forwards;
            }

            .nav-btn {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text-dim);
                padding: 15px 30px;
                font-family: "Syne", sans-serif;
                font-size: 0.9rem;
                text-transform: uppercase;
                cursor: pointer;
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }

            .nav-btn::before {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 0;
                background: var(--accent);
                z-index: -1;
                transition: all 0.3s ease;
            }

            .nav-btn.active {
                border-color: var(--accent);
                color: var(--bg);
            }

            .nav-btn.active::before {
                height: 100%;
            }

            .nav-btn:hover:not(.active) {
                border-color: var(--text-main);
                color: var(--text-main);
            }

            /* Content Sections */
            .content-area {
                position: relative;
                min-height: 600px;
            }

            section {
                display: none;
                opacity: 0;
                transform: translateY(20px);
                transition: all 0.5s ease;
            }

            section.active {
                display: block;
                animation: sectionReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1)
                    forwards;
            }

            /* Markdown Styling */
            .prose {
                background: var(--surface);
                border: 1px solid var(--border);
                padding: 60px;
                border-radius: 0;
                position: relative;
            }

            .prose::before {
                content: "";
                position: absolute;
                top: -1px;
                left: -1px;
                width: 20px;
                height: 20px;
                border-top: 2px solid var(--accent);
                border-left: 2px solid var(--accent);
            }

            .prose h1, .prose h2, .prose h3 {
                font-family: "Syne", sans-serif;
                text-transform: uppercase;
                margin: 40px 0 20px;
                color: var(--accent);
            }

            .prose h1 {
                font-size: 2.5rem;
                border-bottom: 4px solid var(--border);
                padding-bottom: 10px;
                color: var(--text-main);
            }
            .prose h2 {
                font-size: 1.8rem;
                margin-top: 60px;
            }
            .prose h3 {
                font-size: 1.3rem;
                color: var(--text-main);
                border-left: 4px solid var(--accent);
                padding-left: 15px;
            }

            .prose p {
                margin-bottom: 20px;
                color: var(--text-dim);
                font-size: 1.1rem;
            }
            .prose strong {
                color: var(--text-main);
            }

            .prose ul, .prose ol {
                margin: 20px 0;
                padding-left: 20px;
                list-style: none;
            }

            .prose li {
                position: relative;
                margin-bottom: 15px;
                padding-left: 25px;
            }

            .prose li::before {
                content: ">>";
                position: absolute;
                left: 0;
                color: var(--accent);
                font-weight: bold;
                font-size: 0.8rem;
            }

            .prose table {
                width: 100%;
                border-collapse: collapse;
                margin: 40px 0;
                border: 1px solid var(--border);
            }

            .prose th {
                background: #1a1a1d;
                text-align: left;
                padding: 15px;
                font-family: "Syne", sans-serif;
                text-transform: uppercase;
                font-size: 0.8rem;
                color: var(--accent);
            }

            .prose td {
                padding: 15px;
                border-bottom: 1px solid var(--border);
                color: var(--text-dim);
            }

            .prose tr:hover td {
                background: rgba(255, 255, 255, 0.02);
                color: var(--text-main);
            }

            /* Animations */
            @keyframes reveal {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes sectionReveal {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* Micro-interactions */
            .prose blockquote {
                border-left: 2px solid var(--accent);
                padding: 20px;
                background: rgba(206, 255, 0, 0.03);
                margin: 30px 0;
                font-style: italic;
            }

            .prose a {
                color: var(--accent);
                text-decoration: none;
                border-bottom: 1px solid transparent;
                transition: all 0.3s;
            }

            .prose a:hover {
                border-bottom-color: var(--accent);
                background: rgba(206, 255, 0, 0.1);
            }

            /* Footer */
            footer {
                margin-top: 100px;
                text-align: center;
                padding: 40px;
                border-top: 1px solid var(--border);
                color: var(--text-dim);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.2em;
            }

            /* Responsive Improvements */
            @media (max-width: 768px) {
                .prose {
                    padding: 30px;
                }
                .brand-logo {
                    font-size: 3.5rem;
                }
                .nav-btn {
                    padding: 10px 20px;
                    font-size: 0.7rem;
                }
            }
        </style>

## Key Patterns

### What Makes Content Go Viral

1. **Fear + Solution hooks** — "AI will replace you... unless you do X" crushes on YouTube
2. **Speed demos** — 60-second AI builds get insane virality on Instagram
3. **Personal story format** — Justin Welsh dominates LinkedIn with narrative + universal lesson
4. **Contrarian takes** — "Why 95% fail" or "Stop doing X, do Y" drives comments
5. **Tool roundups** — Reliable YouTube format. "Best 10 AI tools" = consistent views
6. **Origin stories** — Your dropout-to-architect narrative is underused and highly engaging

### Platform Cheat Sheet

| Platform | Best Format | Optimal Length | How to Win |
| ---------- | ------------- | ---------------- | ------------ |
| YouTube | Tutorials, tool demos, "how I did it" | 8-15 min long / < 60s shorts | Views ÷ Subs ≥ 3x |
| Instagram | Speed demos, AI hacks, aspirational POVs | 15-45 seconds | Views ÷ Followers ≥ 3x |
