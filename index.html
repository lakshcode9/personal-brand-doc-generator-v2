<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3h Creator | Strategy Engine v3</title>

    <!-- Distinctive Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Instrument+Sans:wght@400;500;700&family=Outfit:wght@200;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            /* 3h Creator Core Colors */
            --bg-deep: #000000;
            --card-surface: #0a0a0a;
            --accent-purple: #7C3AED;
            --accent-purple-glow: rgba(124, 58, 237, 0.4);
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --nav-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Instrument Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Atmoshere */
        .ambient-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-purple-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(100px);
            pointer-events: none;
        }

        .orb-top-right {
            top: -200px;
            right: -100px;
            opacity: 0.6;
        }

        .orb-bottom-left {
            bottom: -200px;
            left: -100px;
            opacity: 0.4;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-purple);
        }

        /* Main Context Grid */
        .app-wrapper {
            display: grid;
            grid-template-columns: var(--nav-width) 1fr;
            min-height: 100vh;
        }

        /* Glassy Sidebar */
        aside {
            position: sticky;
            top: 0;
            height: 100vh;
            border-right: 1px solid var(--glass-border);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 50px;
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(20px);
        }

        .logo-container {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .logo-container span {
            color: var(--accent-purple);
            font-style: italic;
            font-weight: 300;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            color: white;
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(5px);
        }

        .nav-item.active {
            color: white;
            background: rgba(124, 58, 237, 0.12);
            border-left: 3px solid var(--accent-purple);
        }

        /* Top Bar Interface */
        .content-container {
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 50px;
            animation: slideInDown 0.8s ease forwards;
        }

        .client-branding h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .client-branding p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .btn-action {
            background: #FFFFFF;
            color: #000000;
            padding: 14px 28px;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .btn-action:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(124, 58, 237, 0.3);
            background: var(--accent-purple);
            color: white;
        }

        /* Content Sections */
        main {
            opacity: 0;
            animation: fadeIn 1s ease 0.4s forwards;
        }

        .strategy-card {
            background: var(--card-surface);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .strategy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* Markdown Overrides */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            font-family: 'Cormorant Garamond', serif;
            color: white;
            margin-bottom: 24px;
        }

        .markdown-body h2 {
            font-size: 2.2rem;
            margin-top: 40px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .markdown-body p {
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .markdown-body strong {
            color: white;
            font-weight: 600;
        }

        .markdown-body ul {
            list-style: none;
            margin-bottom: 20px;
        }

        .markdown-body li {
            margin-bottom: 12px;
            position: relative;
            padding-left: 20px;
            color: var(--text-secondary);
        }

        .markdown-body li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent-purple);
        }

        /* Loading Overlay Overlay */
        #loadingState {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 32px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-purple);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-family: 'Outfit', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .app-wrapper {
                grid-template-columns: 1fr;
            }

            aside {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-orb orb-top-right"></div>
    <div class="ambient-orb orb-bottom-left"></div>

    <div class="app-wrapper">
        <aside>
            <div class="logo-container">3h<span>.Creator</span></div>

            <ul class="nav-menu">
                <li class="nav-item active" data-tab="icp" onclick="switchTab('icp')">Target ICP</li>
                <li class="nav-item" data-tab="personas" onclick="switchTab('personas')">Research Personas</li>
                <li class="nav-item" data-tab="research" onclick="switchTab('research')">Content Research</li>
                <li class="nav-item" data-tab="deliverable" onclick="switchTab('deliverable')">Strategy Output</li>
            </ul>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                <div class="status-indicator" style="display: flex; align-items: center; gap: 10px;">
                    <div id="statusDot"
                        style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e;">
                    </div>
                    <span id="statusText" style="font-size: 0.85rem; color: var(--text-secondary);">System Ready</span>
                </div>
            </div>
        </aside>

        <div class="content-container">
            <header>
                <div class="client-branding">
                    <h1 id="clientName">Elite Strategy</h1>
                    <p id="clientNiche">Content Alpha Engine v3.1</p>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button class="btn-action" id="btnGenerateDummy">⚡ Generate Flow</button>
                    <!-- Small Menu Toggle for Mobile if needed -->
                </div>
            </header>

            <main>
                <div class="strategy-card" id="cardContainer">
                    <div id="loadingState">
                        <div class="spinner"></div>
                        <div class="loading-text" id="loadingLabel">Synthesizing...</div>
                    </div>

                    <div class="markdown-body" id="mdContent">
                        <!-- Content Injected Here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Smooth Tab Switching with Transitions
        async function switchTab(tabId) {
            // UI updates
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

            const card = document.getElementById('cardContainer');
            const mdArea = document.getElementById('mdContent');
            const loader = document.getElementById('loadingState');

            // Fade Out
            mdArea.style.opacity = '0';
            mdArea.style.transform = 'translateY(10px)';
            loader.style.display = 'flex';
            document.getElementById('loadingLabel').textContent = `ACCESSING ${tabId.toUpperCase()}...`;

            // Wait a bit for "synthesizing" effect
            setTimeout(async () => {
                await loadContent(tabId);
                loader.style.display = 'none';
                mdArea.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                mdArea.style.opacity = '1';
                mdArea.style.transform = 'translateY(0)';
            }, 600);
        }

        async function loadContent(tabId) {
            const fileMap = {
                'icp': 'icp.md',
                'personas': 'personas.md',
                'research': 'viral_content_research.md',
                'deliverable': 'client_deliverable.md'
            };

            const file = fileMap[tabId];

            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error();
                const md = await res.text();
                document.getElementById('mdContent').innerHTML = marked.parse(md);
            } catch (e) {
                document.getElementById('mdContent').innerHTML = `
                    <div style="text-align: center; padding: 100px 0;">
                        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 20px;">Data Void Detected.</h2>
                        <p style="color: var(--text-secondary);">The engine requires a primary intake flow to generate this segment.</p>
                        <button class="btn-action" style="margin-top: 30px;" onclick="document.getElementById('btnGenerateDummy').click()">Initialize Engine</button>
                    </div>
                `;
            }
        }

        // Dummy Data Generator Logic
        document.getElementById('btnGenerateDummy').addEventListener('click', async () => {
            const btn = document.getElementById('btnGenerateDummy');
            const dot = document.getElementById('statusDot');
            const status = document.getElementById('statusText');

            btn.innerHTML = '⚙️ ENGINE FIRING...';
            btn.style.opacity = '0.5';
            btn.disabled = true;

            dot.style.background = '#eab308';
            dot.style.boxShadow = '0 0 10px #eab308';
            status.textContent = 'Processing Pipeline';

            try {
                const res = await fetch('/api/generate-dummy', { method: 'POST' });
                const json = await res.json();

                // Poll for completion by checking if deliverable exists
                let checkInterval = setInterval(async () => {
                    try {
                        const checkRes = await fetch('/client_deliverable.md', { method: 'HEAD' });
                        if (checkRes.ok) {
                            clearInterval(checkInterval);
                            btn.innerHTML = '✅ FLOW READY';
                            btn.style.background = '#22c55e';
                            btn.style.color = '#FFFFFF';

                            dot.style.background = '#22c55e';
                            dot.style.boxShadow = '0 0 10px #22c55e';
                            status.textContent = 'Alpha Complete';

                            fetchClientData();
                            switchTab('icp');
                        }
                    } catch (e) { }
                }, 5000);
            } catch (e) {
                alert("Core Link Failure: " + e);
            }
        });

        async function fetchClientData() {
            try {
                const res = await fetch('/client_input.json');
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('clientName').textContent = data.brand.name;
                document.getElementById('clientNiche').textContent = data.brand.niche;
            } catch (e) { }
        }

        // Initialize
        fetchClientData();
        switchTab('icp');

    </script>
</body>

</html>
